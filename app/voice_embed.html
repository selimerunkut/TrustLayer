<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { --card: #161b26; --text: #f0f4ff; --muted: #9aa4bf; --danger: #f87171; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; color: var(--text); background: transparent; }
    .orb-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 4px 0 8px; }
    .orb {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(145deg, #2a3555, #141a2a);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
      cursor: pointer;
      transition: box-shadow 0.25s ease;
    }
    .orb.listening { box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.45), 0 0 20px rgba(34, 197, 94, 0.2); animation: pulse 1.4s ease-in-out infinite; }
    .orb.thinking { box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.5); animation: spin 1s linear infinite; }
    .orb.speaking { box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.5); animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
    @keyframes spin { from{transform:rotate(0);} to{transform:rotate(360deg);} }
    .status { font-size: 0.8rem; color: var(--muted); text-align: center; min-height: 1.2em; max-width: 100%; }
    .status strong { color: var(--text); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: center; margin-top: 6px; }
    button { border: none; border-radius: 999px; padding: 8px 16px; font-size: 0.8rem; font-weight: 600; cursor: pointer; background: #e2e8f0; color: #0f172a; }
    button.secondary { background: transparent; color: var(--text); border: 1px solid rgba(255,255,255,0.2); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .panel { background: var(--card); border-radius: 10px; padding: 8px 10px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.06); max-height: 120px; overflow: auto; }
    .panel h3 { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 0 0 4px; }
    .t { font-size: 0.78rem; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    .interim { color: var(--muted); font-style: italic; }
    .err { color: var(--danger); font-size: 0.75rem; margin-top: 6px; text-align: center; }
    #crm { display: none; }
  </style>
</head>
<body>
  <div class="orb-wrap">
    <div class="orb" id="orb" title="Start / stop"></div>
    <div class="status" id="status">Tap orb to talk.</div>
    <div class="row">
      <button id="btnStart" type="button">Start</button>
      <button id="btnStop" type="button" class="secondary" disabled>Stop</button>
    </div>
    <input id="crm" type="text" value="" />
  </div>
  <p class="err" id="err" style="display:none;"></p>
  <div class="panel"><h3>You</h3><div class="t" id="live"></div><div class="t interim" id="interim"></div></div>
  <div class="panel"><h3>Betty</h3><div class="t" id="reply"></div></div>

  <script>
    const API_BASE = "__BETTY_API_BASE__";
    const threadId = "__THREAD_ID__";
    const crmInput = document.getElementById("crm");
    crmInput.value = "__CRM_ID__";

    const orb = document.getElementById("orb");
    const status = document.getElementById("status");
    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");
    const errEl = document.getElementById("err");
    const liveEl = document.getElementById("live");
    const interimEl = document.getElementById("interim");
    const replyEl = document.getElementById("reply");

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;
    let sessionBusy = false;
    let debounceTimer = null;
    let speechBuffer = "";

    function setErr(msg) {
      if (!msg) { errEl.style.display = "none"; errEl.textContent = ""; return; }
      errEl.style.display = "block"; errEl.textContent = msg;
    }
    function setOrb(state) {
      orb.classList.remove("listening", "thinking", "speaking");
      if (state) orb.classList.add(state);
    }
    function setStatus(html) { status.innerHTML = html; }

    function detailMessage(data) {
      const d = data && data.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d)) return d.map((x) => x.msg || JSON.stringify(x)).join("; ");
      return "Request failed";
    }

    async function sendUtterance(text) {
      const t = text.trim();
      if (!t || sessionBusy) return;
      sessionBusy = true;
      speechBuffer = "";
      if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
      if (recognition) { try { recognition.stop(); } catch (e) {} }

      setOrb("thinking");
      setStatus("<strong>Betty</strong> is thinking…");
      interimEl.textContent = "";
      liveEl.textContent += (liveEl.textContent ? "\n\n" : "") + t;

      try {
        const r = await fetch(API_BASE + "/api/betty/voice-chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            thread_id: threadId,
            message: t,
            crm_customer_id: (crmInput.value || "vasiliy").trim(),
          }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(detailMessage(data));
        const reply = data.reply || "";
        replyEl.textContent = reply;

        setOrb("speaking");
        setStatus("<strong>Betty</strong> is speaking…");

        const tr = await fetch(API_BASE + "/api/betty/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: reply }),
        });
        if (!tr.ok) {
          const err = await tr.json().catch(() => ({}));
          throw new Error(detailMessage(err));
        }
        const blob = await tr.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        await new Promise((resolve, reject) => {
          audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
          audio.onerror = reject;
          audio.play().catch(reject);
        });
      } catch (e) {
        setErr(String(e.message || e));
        replyEl.textContent = "(No reply.)";
      } finally {
        sessionBusy = false;
        setErr("");
        if (listening) {
          setOrb("listening");
          setStatus("<strong>Listening</strong>");
          try { recognition && recognition.start(); } catch (e) {}
        } else {
          setOrb("");
          setStatus("Stopped.");
        }
      }
    }

    function flushBuffer() {
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = null;
      const chunk = speechBuffer.trim();
      speechBuffer = "";
      if (chunk && !sessionBusy) sendUtterance(chunk);
    }
    function scheduleFlush() {
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(flushBuffer, 850);
    }

    function onSpeechResult(event) {
      if (sessionBusy) return;
      let interim = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const res = event.results[i];
        const txt = res[0].transcript;
        if (res.isFinal) speechBuffer += " " + txt;
        else interim += txt;
      }
      interimEl.textContent = interim.trim();
      if (speechBuffer.trim()) scheduleFlush();
    }
    function onSpeechEnd() {
      if (listening && !sessionBusy && recognition) {
        try { recognition.start(); } catch (e) {}
      }
    }

    function startConversation() {
      setErr("");
      if (!SpeechRecognition) {
        setErr("Use Chrome or Edge for voice.");
        return;
      }
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = navigator.language || "en-US";
      recognition.onresult = onSpeechResult;
      recognition.onerror = (e) => {
        if (e.error === "not-allowed") setErr("Mic denied.");
        else if (e.error !== "no-speech" && e.error !== "aborted") setErr(e.error);
      };
      recognition.onend = onSpeechEnd;
      listening = true;
      btnStart.disabled = true;
      btnStop.disabled = false;
      setOrb("listening");
      setStatus("<strong>Listening</strong>");
      try { recognition.start(); }
      catch (e) {
        setErr(String(e));
        listening = false;
        btnStart.disabled = false;
        btnStop.disabled = true;
        setOrb("");
      }
    }

    function stopConversation() {
      listening = false;
      btnStart.disabled = false;
      btnStop.disabled = true;
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = null;
      speechBuffer = "";
      if (recognition) {
        try { recognition.stop(); } catch (e) {}
        recognition.onend = null;
      }
      recognition = null;
      setOrb("");
      setStatus("Stopped.");
      interimEl.textContent = "";
    }

    btnStart.addEventListener("click", startConversation);
    btnStop.addEventListener("click", stopConversation);
    orb.addEventListener("click", () => {
      if (listening) stopConversation();
      else startConversation();
    });
  </script>
</body>
</html>
