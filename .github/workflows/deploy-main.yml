name: Deploy TrustLayer to Coolify

on:
  push:
    branches:
      - main

concurrency:
  group: trustlayer-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COOLIFY_API_BASE: http://37.27.94.136:8000/api/v1
      TRUSTLAYER_WEB_URL: https://trustlayer.37-27-94-136.sslip.io
      SOURCE_COMMIT: ${{ github.sha }}
      COOLIFY_RESOURCE_UUID: ${{ vars.COOLIFY_RESOURCE_UUID }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trigger Coolify deployment and verify rollout
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          api_base = os.environ["COOLIFY_API_BASE"].rstrip("/")
          token = os.environ["COOLIFY_TOKEN"].strip()
          resource_uuid = os.environ["COOLIFY_RESOURCE_UUID"].strip()
          expected_sha = os.environ["SOURCE_COMMIT"].strip()
          web_url = os.environ["TRUSTLAYER_WEB_URL"].rstrip("/")
          legacy_api_url = "https://trustlayer-api.37-27-94-136.sslip.io"

          if not token:
              raise SystemExit("COOLIFY_TOKEN is required")
          if not resource_uuid:
              raise SystemExit("COOLIFY_RESOURCE_UUID is required")

          headers = {"Authorization": f"Bearer {token}"}

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None

          no_redirect_opener = urllib.request.build_opener(NoRedirect())
          default_opener = urllib.request.build_opener()

          def request(
              url: str,
              *,
              method: str = "GET",
              body: dict | None = None,
              follow_redirects: bool = True,
          ):
              data = None
              req_headers = dict(headers)
              if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  req_headers["Content-Type"] = "application/json"
              req = urllib.request.Request(url, data=data, method=method, headers=req_headers)
              opener = default_opener if follow_redirects else no_redirect_opener
              try:
                  with opener.open(req, timeout=60) as resp:
                      payload = resp.read().decode("utf-8")
                      return resp.status, resp.headers, payload
              except urllib.error.HTTPError as exc:
                  payload = exc.read().decode("utf-8", errors="replace")
                  return exc.code, exc.headers, payload

          def get_json(url: str):
              status, _, payload = request(url)
              return json.loads(payload)

          deploy_url = f"{api_base}/deploy?uuid={urllib.parse.quote(resource_uuid)}&force=false"
          status, _, payload = request(deploy_url)
          if status not in (200, 201):
              raise SystemExit(f"Coolify deploy failed: HTTP {status} {payload}")

          try:
              response = json.loads(payload)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"Coolify deploy response was not JSON: {payload}") from exc

          deployment_uuid = None
          if isinstance(response, dict):
              deployments = response.get("deployments") or []
              if deployments:
                  deployment_uuid = deployments[0].get("deployment_uuid")
              deployment_uuid = deployment_uuid or response.get("deployment_uuid") or response.get("uuid")

          if not deployment_uuid:
              raise SystemExit(f"Could not find deployment UUID in Coolify response: {response}")

          terminal_success = {"success", "succeeded", "finished", "completed", "deployed"}
          terminal_failure = {"failed", "error", "cancelled", "canceled"}

          deadline = time.time() + 20 * 60
          while time.time() < deadline:
              dep = get_json(f"{api_base}/deployments/{deployment_uuid}")
              status_name = str(dep.get("status", "")).lower()
              if status_name in terminal_success:
                  break
              if status_name in terminal_failure:
                  raise SystemExit(f"Coolify deployment failed: {dep}")
              time.sleep(10)
          else:
              raise SystemExit(f"Timed out waiting for Coolify deployment {deployment_uuid}")

          def wait_http(url: str, expected_sha: str | None = None):
              http_deadline = time.time() + 20 * 60
              last_error = None
              while time.time() < http_deadline:
                  try:
                      status, _, body = request(url, follow_redirects=False)
                      if status >= 400:
                          raise RuntimeError(f"HTTP {status}")
                      if expected_sha is not None:
                          data = json.loads(body)
                          if data.get("git_sha") != expected_sha:
                              raise SystemExit(f"{url} reported {data.get('git_sha')!r}, expected {expected_sha!r}")
                      return body
                  except Exception as exc:
                      last_error = exc
                      time.sleep(10)
              raise SystemExit(f"Timed out waiting for {url}: {last_error}")

          def assert_not_fastapi(url: str, *, method: str = "GET"):
              status, resp_headers, body = request(url, method=method, follow_redirects=False)
              content_type = resp_headers.get("Content-Type", "")
              normalized = body.lower()
              if status in {301, 302, 303, 307, 308}:
                  raise SystemExit(f"{url} is redirecting instead of serving the expected edge response: HTTP {status} {body}")
              if "application/json" in content_type.lower():
                  raise SystemExit(f"{url} returned JSON where Streamlit or the edge should have handled the request: HTTP {status} {body}")
              if status < 400:
                  if (
                      '"status":"ok"' in normalized
                      or '"git_sha"' in normalized
                      or '"openapi"' in normalized
                      or "swaggeruibundle" in normalized
                      or 'redoc' in normalized
                  ):
                      raise SystemExit(f"{url} is still serving a FastAPI response: HTTP {status} {body}")

          def assert_legacy_host_blocked(url: str):
              status, resp_headers, body = request(url, follow_redirects=False)
              if status in {301, 302, 303, 307, 308}:
                  raise SystemExit(f"{url} is redirecting unexpectedly: HTTP {status} {body}")
              if status not in {404, 410}:
                  raise SystemExit(f"{url} did not return the expected blocked edge response: HTTP {status} {body}")

          wait_http(f"{web_url}/health")
          wait_http(f"{web_url}/version", expected_sha=expected_sha)
          wait_http(f"{web_url}/_stcore/health")
          assert_not_fastapi(f"{web_url}/chat")
          assert_not_fastapi(f"{web_url}/mode/preflight")
          assert_not_fastapi(f"{web_url}/api/betty/voice-ui-transcript/test-thread")
          assert_not_fastapi(f"{web_url}/openapi.json")
          assert_not_fastapi(f"{web_url}/docs")
          assert_legacy_host_blocked(f"{legacy_api_url}/health")
          assert_legacy_host_blocked(f"{legacy_api_url}/version")

          print(f"Coolify deployment {deployment_uuid} reached the deployed state and served {expected_sha}.")
          PY
